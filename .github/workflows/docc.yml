name: DocC

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Cache SwiftPM Shared Cache
        uses: actions/cache@v4
        with:
          path: .swiftpm-cache
          key: ${{ runner.os }}-swiftpm-cache-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-cache-

      - name: Build documentation
        run: |
          swift package --cache-path .swiftpm-cache --allow-writing-to-directory ./docs generate-documentation \
            --target SwiftInterfaceGenerator \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path SwiftInterfaceGenerator \
            --output-path ./docs

          cat > docs/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>SwiftInterfaceGenerator Documentation</title>
            <meta http-equiv="refresh" content="0; url=./documentation/swiftinterfacegenerator/">
            <link rel="canonical" href="./documentation/swiftinterfacegenerator/">
            <script>
              location.replace(new URL("./documentation/swiftinterfacegenerator/", location.href));
            </script>
          </head>
          <body>
            <p>
              Redirecting to
              <a href="./documentation/swiftinterfacegenerator/">SwiftInterfaceGenerator documentation</a>.
            </p>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
